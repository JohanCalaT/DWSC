services:
  db:
    image: postgres:latest
    container_name: universidad_postgres
    environment:
      POSTGRES_DB: universidad_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
